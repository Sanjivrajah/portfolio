name: CI/CD - Next.js Static Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via lftp SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_PATH: ${{ secrets.SFTP_PATH }}
        run: |
          lftp -u "$SFTP_USER","$SFTP_PASS" \
            -p "$SFTP_PORT" \
            sftp://$SFTP_HOST <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 3
          mirror --reverse --delete --verbose out/ $SFTP_PATH
          bye
          EOF

      - name: Deployment success timestamp
        run: echo "✅ Deployed at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"